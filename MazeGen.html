        <script>
        let modeText=document.getElementById("mode");
        let programCode = function(p) {
            p.size(800, 800);
            p.strokeCap(p.SQUARE);

let mazeWidth=15;
let mazeHeight=10;
let running=false;

const TextArray=function(array) {
    let output="[";
    for (let i=0; i<array.length; i++) {
        if (Array.isArray(array[i])) {
            output+=TextArray(array[i]);
        } else {
            output+=array[i];
        }
        if (i<array.length-1) {
            output+=", ";
        }
    }
    output+="]";
    return(output);
}

//0=Origin Shift, 1=Recursive Backtracking
const findInArray=function(Desired,Array) {
    let index=-1
    for (let i=0; i<Array.length; i++) {
        if (Desired===Array[i]) {
            index=i;
        }
    }
    return(index);
};

const node=function(x,y) {
    this.x=x;
    this.y=y;
    this.adj=[];
    this.c=[];
};
const connection=function(node1,node2) {
    this.node1=node1;
    this.node2=node2;
    this.node1.c.push(this);
    this.node2.c.push(this);
};

const maze=function(sizeX,sizeY) {
    //A maze is a set of nodes and connections between adjacent nodes. The maze object creates the set of node objects according to the dimensions entered, and initializes an empty set of connections.
    this.sizeX=sizeX;
    this.sizeY=sizeY;
    this.xInc=p.width/(this.sizeX);
    this.yInc=p.height/(this.sizeY);
    this.type=-1;
    this.n=[];
    this.c=[];
    this.displayWalls=true;
    for (let i=0; i<sizeX; i++) {
        for (let j=0; j<sizeY; j++) {
            this.n.push(new node(i,j));
            if (i!==0) {
                this.n[i*sizeY+j].adj.push(this.n[(i-1)*sizeY+j]);
                this.n[(i-1)*sizeY+j].adj.push(this.n[i*sizeY+j]);
            }
            if (j!==0) {
                this.n[i*sizeY+j].adj.push(this.n[i*sizeY+j-1]);
                this.n[i*sizeY+j-1].adj.push(this.n[i*sizeY+j]);
            }
        }
    }
};
maze.prototype.getNodeByLocation=function(x,y) {
    for (let i=0; i<this.n.length; i++) {
        if (this.n[i].x===x&&this.n[i].y===y) {
            return this.n[i];
        }
    }
};
maze.prototype.removeConnection=function(C) {
    this.c.splice(findInArray(C,this.c),1);
    C.node1.c.splice(findInArray(C,C.node1.c),1);
    C.node2.c.splice(findInArray(C,C.node2.c),1);
};
maze.prototype.removeConnByLocation=function(x1,y1,x2,y2) {
    for (let i=0; i<this.c.length; i++) {
        if ((this.c[i].node1.x===x1&&this.c[i].node1.y===y1&&this.c[i].node2.x===x2&&this.c[i].node2.y===y2)||(this.c[i].node2.x===x1&&this.c[i].node2.y===y1&&this.c[i].node1.x===x2&&this.c[i].node1.y===y2)) {
            this.removeConnection(this.c[i]);
            i--;
        }
    }
};
maze.prototype.updateStep=function() {

};
maze.prototype.drawMaze=function() {
    if (this.displayWalls) {
        p.background(0,0,0);
        p.noStroke();
        p.fill(255,255,255);
        for (let i=0; i<this.n.length; i++) {
            if (this.n[i].c.length===0) {
                let left=p.round(this.n[i].x*this.xInc+5);
                let right=p.round((this.n[i].x+1)*this.xInc-5);
                let top=p.round(this.n[i].y*this.yInc+5);
                let bottom=p.round((this.n[i].y+1)*this.yInc-5);
                p.rect(left,top,right-left,bottom-top);
            }
        }
        for (let i=0; i<this.c.length; i++) {
            let left=p.round(p.min(this.c[i].node1.x,this.c[i].node2.x)*this.xInc+5);
            let right=p.round((p.max(this.c[i].node1.x,this.c[i].node2.x)+1)*this.xInc-5);
            let top=p.round(p.min(this.c[i].node1.y,this.c[i].node2.y)*this.yInc+5);
            let bottom=p.round((p.max(this.c[i].node1.y,this.c[i].node2.y)+1)*this.yInc-5);
            p.rect(left,top,right-left,bottom-top);
        }
    } else {
        p.background(255,255,255);
        p.stroke(0,0,0);
        p.strokeWeight(10);
        for (let i=0; i<this.n.length; i++) {
            p.point((this.n[i].x+1/2)*this.xInc,(this.n[i].y+1/2)*this.yInc);
        }
        for (let i=0; i<this.c.length; i++) {
            let x1=this.c[i].node1.x*this.xInc+this.xInc/2;
            let y1=this.c[i].node1.y*this.yInc+this.yInc/2;
            let x2=this.c[i].node2.x*this.xInc+this.xInc/2;
            let y2=this.c[i].node2.y*this.yInc+this.yInc/2;
            p.line(x1,y1,x2,y2);
        }
    }
};

//Origin Shift Method:
const originShift=function(sizeX,sizeY) {
    maze.call(this, sizeX, sizeY);
    this.type=0;
    this.o=this.n[0];
    for (let i=0; i<this.sizeX; i++) {
        if (i>0) {
            this.c.push(new connection(this.n[i*this.sizeY],this.n[(i-1)*this.sizeY]));
        }
        for (let j=1; j<this.sizeY; j++) {
            this.c.push(new connection(this.n[j+i*this.sizeY],this.n[j-1+i*this.sizeY]))
        }
    }
};
originShift.prototype=Object.create(maze.prototype);
originShift.prototype.updateStep=function() {
    let nexto=this.o.adj[p.floor(p.random()*this.o.adj.length)];
    this.c.push(new connection(this.o,nexto));
    for (let i=0; i<nexto.c.length; i++) {
        if (nexto.c[i].node1===nexto) {
            this.removeConnection(nexto.c[i]);
        }
    }
    this.o=nexto;
};
originShift.prototype.drawMaze=function() {
    maze.prototype.drawMaze.call(this);
    if (!this.displayWalls) {
        p.stroke(0,0,0);
        p.strokeWeight(10);
        for (let i=0; i<this.c.length; i++) {
            let x1=this.c[i].node2.x*this.xInc+this.xInc/2;
            let y1=this.c[i].node2.y*this.yInc+this.yInc/2;
            let x2=this.c[i].node1.x*this.xInc+this.xInc/2;
            let y2=this.c[i].node1.y*this.yInc+this.yInc/2;
            p.line(x1,y1,((x2-x1)*p.sqrt(3)/2-(y2-y1)*0.5)/3+x1,((x2-x1)*0.5+(y2-y1)*p.sqrt(3)/2)/3+y1);
            p.line(x1,y1,((x2-x1)*p.sqrt(3)/2+(y2-y1)*0.5)/3+x1,(-(x2-x1)*0.5+(y2-y1)*p.sqrt(3)/2)/3+y1);
        }
        p.fill(0,255,0,127);
        p.noStroke();
        p.ellipse((this.o.x+1/2)*this.xInc,(this.o.y+1/2)*this.yInc,50,50);
    }
}

//Recursive Backtracking Method
const RB=function(sizeX,sizeY) {
    maze.call(this,sizeX,sizeY);
    this.type=1;
    this.stack=[this.n[p.floor(p.random()*this.n.length)]];
};
RB.prototype=Object.create(maze.prototype);
RB.prototype.updateStep=function() {
    if (this.stack.length>0) {
        let valid=[];
        for (let i=0; i<this.stack[0].adj.length; i++) {
            if (this.stack[0].adj[i].c.length===0) {
                valid.push(this.stack[0].adj[i]);
            }
        }
        if (valid.length>0) {
            let selection=p.floor(p.random()*valid.length);
            
            this.c.push(new connection(this.stack[0],valid[selection]));
            this.stack.splice(0,0,valid[selection]);
        } else {
            this.stack.splice(0,1);
        }
    }
};
RB.prototype.drawMaze=function() {
    maze.prototype.drawMaze.call(this);
    if (this.displayWalls) {
        p.noStroke();
        p.fill(0,255,0);
        for (let i=0; i<this.stack.length; i++) {
            let left=p.round(this.stack[i].x*this.xInc+5);
            let right=p.round((this.stack[i].x+1)*this.xInc-5);
            let top=p.round(this.stack[i].y*this.yInc+5);
            let bottom=p.round((this.stack[i].y+1)*this.yInc-5);
            p.rect(left,top,right-left,bottom-top);
        }
    }
}

//Prim's Algorithm
const PA=function(sizeX,sizeY) {
    maze.call(this,sizeX,sizeY);
    this.type=2;
    this.frontier=[];
    for (let i=0; i<this.n.length; i++) {
        this.inMaze=false;
        if (this.n[i].x>0) {
            this.c.push(new connection(this.n[i],this.getNodeByLocation(this.n[i].x-1,this.n[i].y)));
        }
        if (this.n[i].y>0) {
            this.c.push(new connection(this.n[i],this.getNodeByLocation(this.n[i].x,this.n[i].y-1)));
        }
    }
    for (let i=0; i<this.c.length; i++) {
        this.active=false;
    }
    let temp=p.floor(p.random()*this.n.length);
    this.n[temp].inMaze=true;
    for (let i=0; i<this.n[temp].c.length; i++) {
        this.frontier.push(this.n[temp].c[i]);
    }
    //p.println("("+this.n[temp].x+", "+this.n[temp].y+")")
}
PA.prototype=Object.create(maze.prototype);
PA.prototype.updateStep=function() {
    /*let currentList="";
    for (let i=0; i<this.frontier.length; i++) {
        currentList+="("+this.frontier[i].node1.x+", "+this.frontier[i].node1.y+") to ("+this.frontier[i].node2.x+", "+this.frontier[i].node2.y+")";
        if (i<this.frontier.length-1) {
            currentList+=", "
        }
    }
    p.println(currentList);*/
    if (this.frontier.length>0) {
        let temp=p.floor(p.random()*this.frontier.length);
        //p.println(temp+"=("+this.frontier[temp].node1.x+", "+this.frontier[temp].node1.y+") to ("+this.frontier[temp].node2.x+", "+this.frontier[temp].node2.y+")");
        if (!this.frontier[temp].node1.inMaze) {
            this.frontier[temp].active=true;
            this.frontier[temp].node1.inMaze=true;
            for (let i=0; i<this.frontier[temp].node1.c.length; i++) {
                if (!this.frontier[temp].node1.c[i].node1.inMaze||!this.frontier[temp].node1.c[i].node2.inMaze) {
                    this.frontier.push(this.frontier[temp].node1.c[i]);
                } else if (this.frontier[temp].node1.c[i]!==this.frontier[temp]) {
                    //p.println("Detected a connection between two cells in the maze, off of node 1. ("+this.frontier[temp].node1.c[i].node1.x+", "+this.frontier[temp].node1.c[i].node1.y+") to ("+this.frontier[temp].node1.c[i].node2.x+", "+this.frontier[temp].node1.c[i].node2.y+").");
                    let temp2=findInArray(this.frontier[temp].node1.c[i],this.frontier);
                    //p.println(temp2);
                    if (temp2>=0) {
                        this.frontier.splice(temp2,1);
                        if (temp>temp2) {
                            temp=temp-1;
                        }
                    }
                }
            }
        }
        if (!this.frontier[temp].node2.inMaze) {
            this.frontier[temp].active=true;
            this.frontier[temp].node2.inMaze=true;
            for (let i=0; i<this.frontier[temp].node2.c.length; i++) {
                if (!this.frontier[temp].node2.c[i].node1.inMaze||!this.frontier[temp].node2.c[i].node2.inMaze) {
                    this.frontier.push(this.frontier[temp].node2.c[i]);
                } else if (this.frontier[temp].node2.c[i]!==this.frontier[temp]) {
                    //p.println("Detected a connection between two cells in the maze, off of node 2. ("+this.frontier[temp].node2.c[i].node1.x+", "+this.frontier[temp].node2.c[i].node1.y+") to ("+this.frontier[temp].node2.c[i].node2.x+", "+this.frontier[temp].node2.c[i].node2.y+").");
                    let temp2=findInArray(this.frontier[temp].node2.c[i],this.frontier);
                    //p.println(temp2);
                    if (temp2>=0) {
                        this.frontier.splice(temp2,1);
                        if (temp>temp2) {
                            temp=temp-1;
                        }
                    }
                }
            }
        }
        //p.println(temp+"=("+this.frontier[temp].node1.x+", "+this.frontier[temp].node1.y+") to ("+this.frontier[temp].node2.x+", "+this.frontier[temp].node2.y+")");
        this.frontier.splice(temp,1);
        for (let i=0; i<this.frontier.length; i++) {
            if (this.frontier[i].node1.inMaze&&this.frontier[i].node2.inMaze) {
                p.println("("+this.frontier[i].node1.x+", "+this.frontier[i].node1.y+") to ("+this.frontier[i].node2.x+", "+this.frontier[i].node2.y+") was not removed when it should have been.");
            }
        }
    }
}
PA.prototype.drawMaze=function() {
    if (this.displayWalls) {
        p.background(0,0,0);
        p.noStroke();
        p.fill(255,255,255);
        for (let i=0; i<this.n.length; i++) {
            let left=p.round(this.n[i].x*this.xInc+5);
            let right=p.round((this.n[i].x+1)*this.xInc-5);
            let top=p.round(this.n[i].y*this.yInc+5);
            let bottom=p.round((this.n[i].y+1)*this.yInc-5);
            p.rect(left,top,right-left,bottom-top);
        }
        for (let i=0; i<this.c.length; i++) {
            if (this.c[i].active) {
                let left=p.round(p.min(this.c[i].node1.x,this.c[i].node2.x)*this.xInc+5);
                let right=p.round((p.max(this.c[i].node1.x,this.c[i].node2.x)+1)*this.xInc-5);
                let top=p.round(p.min(this.c[i].node1.y,this.c[i].node2.y)*this.yInc+5);
                let bottom=p.round((p.max(this.c[i].node1.y,this.c[i].node2.y)+1)*this.yInc-5);
                p.rect(left,top,right-left,bottom-top);
            }
        }
    } else {
        p.background(255,255,255);
        p.stroke(0,0,0);
        p.strokeWeight(10);
        for (let i=0; i<this.n.length; i++) {
            p.point((this.n[i].x+1/2)*this.xInc,(this.n[i].y+1/2)*this.yInc);
        }
        for (let i=0; i<this.c.length; i++) {
            if (this.c[i].active) {
                let x1=this.c[i].node1.x*this.xInc+this.xInc/2;
                let y1=this.c[i].node1.y*this.yInc+this.yInc/2;
                let x2=this.c[i].node2.x*this.xInc+this.xInc/2;
                let y2=this.c[i].node2.y*this.yInc+this.yInc/2;
                p.line(x1,y1,x2,y2);
            }
        }
    }
}

//Recursive Division
const RD=function(sizeX,sizeY) {
    maze.call(this,sizeX,sizeY);
    this.type=3;
    for (let i=0; i<this.n.length; i++) {
        if (this.n[i].x<this.sizeX-1) {
            this.c.push(new connection(this.n[i],this.getNodeByLocation(this.n[i].x+1,this.n[i].y)));
        }
        if (this.n[i].y<this.sizeY-1) {
            this.c.push(new connection(this.n[i],this.getNodeByLocation(this.n[i].x,this.n[i].y+1)));
        }
    }
    this.chambers=[[0,0,sizeX-1,sizeY-1]];
};
RD.prototype=Object.create(maze.prototype);
RD.prototype.updateStep=function() {
    let candidates=[];
    for (let i=0; i<this.chambers.length; i++) {
        if ((this.chambers[i][2]-this.chambers[i][0])>0&&(this.chambers[i][3]-this.chambers[i][1])>0) {
            candidates.push(this.chambers[i]);
        }
    }
    if (candidates.length>0) {
        let temp=p.floor(p.random()*candidates.length);
        let temp2=p.random()>0.5;
        if (temp2) {
            temp2=p.floor(p.random()*(candidates[temp][2]-candidates[temp][0]-1)+candidates[temp][0]);
            for (let i=candidates[temp][1]; i<=candidates[temp][3]; i++) {
                this.removeConnByLocation(temp2,i,temp2+1,i);
            }
            let temp4=p.floor(p.random()*(candidates[temp][3]-candidates[temp][1]+1)+candidates[temp][1]);
            this.c.push(new connection(this.getNodeByLocation(temp2,temp4),this.getNodeByLocation(temp2+1,temp4)));
            this.chambers.push([candidates[temp][0],candidates[temp][1],temp2,candidates[temp][3]]);
            this.chambers.push([temp2+1,candidates[temp][1],candidates[temp][2],candidates[temp][3]]);
        } else {
            temp2=p.floor(p.random()*(candidates[temp][3]-candidates[temp][1]-1)+candidates[temp][1]);
            for (let i=candidates[temp][0]; i<=candidates[temp][2]; i++) {
                this.removeConnByLocation(i,temp2,i,temp2+1);
            }
            let temp4=p.floor(p.random()*(candidates[temp][2]-candidates[temp][0]+1)+candidates[temp][0]);
            this.c.push(new connection(this.getNodeByLocation(temp4,temp2),this.getNodeByLocation(temp4,temp2+1)));
            this.chambers.push([candidates[temp][0],candidates[temp][1],candidates[temp][2],temp2]);
            this.chambers.push([candidates[temp][0],temp2+1,candidates[temp][2],candidates[temp][3]]);
        }
        let temp3=findInArray(candidates[temp],this.chambers);
        this.chambers.splice(temp3,1);
    }
};

    running=!running;
    if (!running) {
        pauseButton.innerHTML="Play";
    } else {
        pauseButton.innerHTML="Pause";
    }
}

const refreshMaze=function() {
    if (running) {
        running=false;
        pauseButton.innerHTML="Play";
    }
    let temp=p.Maze.displayWalls;
    if (p.Maze.type===0) {
        p.Maze=new originShift(mazeWidth,mazeHeight);
    } else if (p.Maze.type===1) {
        p.Maze=new RB(mazeWidth,mazeHeight);
    } else if (p.Maze.type===2) {
        p.Maze=new PA(mazeWidth,mazeHeight);
    } else if (p.Maze.type===3) {
        p.Maze=new RD(mazeWidth,mazeHeight);
    }
    p.Maze.displayWalls=temp;
}

}

        window.addEventListener('DOMContentLoaded', function() {
            // 1. Get your new desired dimensions
            var newWidth = math.min(800,window.innerWidth-100,window.innerHeight-100);

            // 2. Get the Processing instance bound to your canvas ID
            var processingInstance = Processing.getInstanceById('mycanvas');

            // 3. Update internal sketch dimensions and resize canvas
            if (processingInstance) {
                processingInstance.size(newWidth, newWidth);
                processingInstance.Maze.xInc=processingInstance.width/processingInstance.Maze.sizeX;
                processingInstance.Maze.yInc=processingInstance.height/processingInstance.Maze.sizeY;
            }
        });
        </script>
    </body>
</html>
